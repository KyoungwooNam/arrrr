<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HR Tech — 용어 모음</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0a0c10;
        --bg-elevated: #12151c;
        --surface: #181c26;
        --fg: #e8eaef;
        --fg-soft: #b8bcc8;
        --muted: #7a8194;
        --border: #2a3040;
        --accent: #7c9cff;
        --accent-hot: #a8bfff;
        --chart-1: #7c9cff;
        --chart-2: #5ce1c8;
        --chart-3: #ffb86b;
        --danger: #ff6b7a;
        --radius: 14px;
        --font-display: "Outfit", system-ui, sans-serif;
        --font-body: "Source Serif 4", Georgia, serif;
        --pad-x: clamp(0.85rem, 3vw, 1.5rem);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f2ed;
          --bg-elevated: #ebe7df;
          --surface: #ffffff;
          --fg: #1a1d26;
          --fg-soft: #3d4354;
          --muted: #6b7285;
          --border: #d9d4ca;
          --accent: #3d5a80;
          --accent-hot: #2c4875;
          --chart-1: #3d5a80;
          --chart-2: #2a9d8f;
          --chart-3: #e76f51;
          --danger: #c1121f;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--fg);
        line-height: 1.6;
        background-image: radial-gradient(
            ellipse 100% 70% at 100% -15%,
            rgba(124, 156, 255, 0.07),
            transparent 50%
          ),
          radial-gradient(
            ellipse 70% 45% at 0% 100%,
            rgba(92, 225, 200, 0.05),
            transparent 45%
          );
      }
      .wrap {
        width: 100%;
        max-width: min(1180px, 100% - 2 * var(--pad-x));
        margin: 0 auto;
        padding: 1.5rem var(--pad-x) 3rem;
      }
      header {
        margin-bottom: 1.25rem;
      }
      @media (min-width: 768px) {
        header {
          display: grid;
          grid-template-columns: 1fr auto;
          gap: 1rem 2rem;
          align-items: end;
        }
        .header-text {
          grid-column: 1;
        }
        .meta-bar {
          grid-column: 2;
          grid-row: 1 / span 2;
          justify-content: flex-end;
          align-content: start;
          max-width: 22rem;
        }
      }
      .brand {
        font-family: var(--font-display);
        font-size: clamp(1.5rem, 4vw, 2.1rem);
        font-weight: 700;
        letter-spacing: -0.04em;
        margin: 0 0 0.35rem;
        line-height: 1.12;
      }
      .brand span {
        color: var(--accent);
      }
      .tagline {
        color: var(--muted);
        font-size: clamp(0.88rem, 2.2vw, 1rem);
        margin: 0;
        max-width: 42ch;
      }
      .tz-note {
        font-size: 0.7rem;
        color: var(--muted);
        margin: 0.4rem 0 0;
        opacity: 0.9;
      }
      .meta-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem 0.55rem;
        margin-top: 1rem;
      }
      @media (min-width: 768px) {
        .meta-bar {
          margin-top: 0;
        }
      }
      .pill {
        font-family: var(--font-display);
        font-size: 0.68rem;
        font-weight: 500;
        padding: 0.32rem 0.7rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--fg-soft);
      }
      .pill b {
        color: var(--fg);
        font-weight: 600;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.6rem 1rem;
        margin-bottom: 1.25rem;
      }
      .sr {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }
      #q {
        flex: 1 1 12rem;
        min-width: 0;
        padding: 0.8rem 1rem;
        font-size: 1rem;
        font-family: var(--font-body);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--fg);
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      #q:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124, 156, 255, 0.2);
      }
      #q::placeholder {
        color: var(--muted);
      }
      .shown-count {
        font-family: var(--font-display);
        font-size: 0.78rem;
        color: var(--muted);
        white-space: nowrap;
      }

      /* 클라우드·날짜 블록은 아래 #terms 카드 그리드와 같은 가로 폭(전체 열) */
      .layout-split {
        display: grid;
        gap: 1.25rem;
        margin-bottom: 1.5rem;
        align-items: start;
        grid-template-columns: 1fr;
      }

      .cloud-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0;
        box-shadow: 0 10px 36px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .cloud-panel__head {
        padding: 0.85rem 1rem 0.85rem;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(
          165deg,
          rgba(124, 156, 255, 0.06) 0%,
          transparent 55%
        );
      }
      .cloud-panel__titles {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.5rem 0.75rem;
        margin-bottom: 0.45rem;
      }
      .cloud-panel h2 {
        font-family: var(--font-display);
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--muted);
        margin: 0;
      }
      .cloud-badge {
        font-family: var(--font-display);
        font-size: 0.62rem;
        font-weight: 600;
        padding: 0.2rem 0.5rem;
        border-radius: 6px;
        background: rgba(124, 156, 255, 0.12);
        color: var(--accent-hot);
        border: 1px solid rgba(124, 156, 255, 0.22);
      }
      @media (prefers-color-scheme: light) {
        .cloud-badge {
          background: rgba(61, 90, 128, 0.1);
          border-color: rgba(61, 90, 128, 0.2);
        }
      }
      .cloud-hint {
        font-size: 0.8rem;
        color: var(--muted);
        margin: 0;
        padding-left: 0.55rem;
        border-left: 3px solid var(--chart-2);
        line-height: 1.45;
      }
      .cloud-panel__stage {
        padding: 0.85rem 1rem 1rem;
      }
      /* 높이는 뷰포트·폭에 비례, 카드와 동일한 --radius */
      .wordcloud-wrap {
        position: relative;
        width: 100%;
        min-height: 220px;
        height: clamp(240px, 28vw, min(400px, 42vh));
        border-radius: var(--radius);
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        overflow: hidden;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      @media (prefers-color-scheme: light) {
        .wordcloud-wrap {
          box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
        }
      }
      .wordcloud-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: inherit;
        box-shadow: inset 0 0 48px rgba(0, 0, 0, 0.12);
      }
      @media (prefers-color-scheme: light) {
        .wordcloud-wrap::after {
          box-shadow: inset 0 0 40px rgba(61, 90, 128, 0.06);
        }
      }
      #wordcloud-canvas {
        display: block;
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 1;
      }
      .cloud-fallback {
        display: none;
        flex-wrap: wrap;
        gap: 0.4rem;
        padding: 0.65rem 0 0;
      }
      .cloud-fallback.is-visible {
        display: flex;
      }
      .cloud-fallback span {
        font-family: var(--font-display);
        font-size: 0.72rem;
        padding: 0.28rem 0.55rem;
        background: var(--bg-elevated);
        border-radius: 8px;
        border: 1px solid var(--border);
        transition: border-color 0.15s, background 0.15s;
      }
      .cloud-fallback span:hover {
        border-color: rgba(124, 156, 255, 0.35);
        background: var(--surface);
      }

      .side-aside {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      details.by-date {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        overflow: hidden;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      details.by-date[open] {
        border-color: rgba(124, 156, 255, 0.28);
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.12);
      }
      @media (prefers-color-scheme: light) {
        details.by-date[open] {
          border-color: rgba(61, 90, 128, 0.28);
        }
      }
      details.by-date summary {
        padding: 0.85rem 1rem 0.85rem 0.65rem;
        cursor: pointer;
        list-style: none;
        color: var(--fg-soft);
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
        background: linear-gradient(
          180deg,
          rgba(92, 225, 200, 0.05) 0%,
          transparent 100%
        );
      }
      details.by-date summary::-webkit-details-marker {
        display: none;
      }
      .by-date__chev {
        flex-shrink: 0;
        width: 1.35rem;
        height: 1.35rem;
        margin-top: 0.12rem;
        border-radius: 8px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.65rem;
        color: var(--accent);
        transition: transform 0.2s ease, background 0.15s;
      }
      details.by-date[open] .by-date__chev {
        transform: rotate(90deg);
      }
      .by-date__summary-text {
        flex: 1;
        min-width: 0;
      }
      .by-date__title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 0.88rem;
        color: var(--fg);
        letter-spacing: -0.02em;
        margin: 0 0 0.2rem;
      }
      .by-date__meta {
        font-family: var(--font-display);
        font-size: 0.68rem;
        color: var(--muted);
        font-weight: 500;
        margin: 0;
        line-height: 1.35;
      }
      .by-date__body {
        padding: 0 0.65rem 0.85rem;
        max-height: min(52vh, 28rem);
        overflow-y: auto;
        scrollbar-gutter: stable;
      }
      .by-date__body::-webkit-scrollbar {
        width: 6px;
      }
      .by-date__body::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 99px;
      }
      .day-block {
        position: relative;
        margin-top: 0.65rem;
        padding: 0 0 0 0.85rem;
        border-left: 2px solid rgba(124, 156, 255, 0.35);
      }
      .day-block:first-child {
        margin-top: 0.35rem;
      }
      .day-block__header {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.35rem 0.6rem;
        margin-bottom: 0.5rem;
      }
      .day-block h3 {
        font-family: var(--font-display);
        font-size: 0.8rem;
        font-weight: 700;
        margin: 0;
        color: var(--fg);
        letter-spacing: -0.02em;
      }
      .day-block__badge {
        font-family: var(--font-display);
        font-size: 0.58rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 0.12rem 0.4rem;
        border-radius: 4px;
        background: var(--bg-elevated);
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .run-card {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.55rem 0.65rem 0.6rem;
        margin-bottom: 0.5rem;
      }
      .run-card:last-child {
        margin-bottom: 0;
      }
      .run-card__time {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-family: var(--font-display);
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--chart-2);
        margin: 0 0 0.45rem;
      }
      .run-card__time::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--chart-2);
        opacity: 0.85;
      }
      details.by-date summary:focus {
        outline: none;
      }
      details.by-date summary:focus-visible .by-date__chev {
        box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
      }
      .term-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .term-tags span {
        font-size: 0.65rem;
        font-family: var(--font-display);
        padding: 0.22rem 0.5rem;
        background: var(--surface);
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--fg-soft);
        font-weight: 500;
        transition: border-color 0.15s, color 0.15s;
      }
      .term-tags span:hover {
        border-color: rgba(124, 156, 255, 0.35);
        color: var(--fg);
      }

      .terms-head {
        font-family: var(--font-display);
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 0.65rem;
      }
      #terms {
        display: grid;
        gap: 0.55rem;
        grid-template-columns: 1fr;
      }
      @media (min-width: 560px) {
        #terms {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (min-width: 960px) {
        #terms {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
      .terms-pagination {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.5rem 0.75rem;
        margin-top: 1.15rem;
        padding: 0.85rem 0 0.15rem;
        border-top: 1px solid var(--border);
      }
      .terms-pagination__pages {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.3rem;
        max-width: 100%;
      }
      .terms-page-btn {
        min-width: 2.15rem;
        height: 2.15rem;
        padding: 0 0.4rem;
        font-family: var(--font-display);
        font-size: 0.8rem;
        font-weight: 600;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--fg-soft);
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s, background 0.15s;
      }
      .terms-page-btn:hover:not(:disabled) {
        border-color: rgba(124, 156, 255, 0.45);
        color: var(--accent-hot);
        background: var(--bg-elevated);
      }
      @media (prefers-color-scheme: light) {
        .terms-page-btn:hover:not(:disabled) {
          border-color: rgba(61, 90, 128, 0.4);
        }
      }
      .terms-page-btn:disabled {
        opacity: 0.38;
        cursor: not-allowed;
      }
      .terms-page-btn.is-current {
        background: rgba(124, 156, 255, 0.14);
        border-color: var(--accent);
        color: var(--accent-hot);
      }
      @media (prefers-color-scheme: light) {
        .terms-page-btn.is-current {
          background: rgba(61, 90, 128, 0.12);
        }
      }
      .terms-page-btn--nav {
        min-width: auto;
        padding: 0 0.75rem;
        font-size: 0.72rem;
        text-transform: none;
      }
      .terms-page-ellipsis {
        font-family: var(--font-display);
        font-size: 0.75rem;
        color: var(--muted);
        padding: 0 0.15rem;
        user-select: none;
      }
      details.term-card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        overflow: hidden;
        transition: border-color 0.15s, box-shadow 0.15s;
        min-height: 0;
      }
      details.term-card[open] {
        border-color: rgba(124, 156, 255, 0.45);
        box-shadow: 0 6px 22px rgba(0, 0, 0, 0.12);
        grid-column: 1 / -1;
      }
      @media (min-width: 560px) {
        details.term-card[open] {
          grid-column: span 2;
        }
      }
      @media (min-width: 960px) {
        details.term-card[open] {
          grid-column: span 3;
        }
      }
      details.term-card summary {
        list-style: none;
        cursor: pointer;
        padding: 0.85rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        font-family: var(--font-display);
        font-weight: 600;
        font-size: clamp(0.92rem, 2vw, 1.02rem);
        color: var(--accent-hot);
        user-select: none;
      }
      details.term-card summary::-webkit-details-marker {
        display: none;
      }
      .term-summary-left {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        flex-wrap: wrap;
        min-width: 0;
      }
      .term-name {
        letter-spacing: -0.02em;
        word-break: break-word;
      }
      .term-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem;
      }
      .badge {
        font-size: 0.62rem;
        font-weight: 600;
        padding: 0.12rem 0.4rem;
        border-radius: 6px;
        background: var(--bg-elevated);
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .badge.hot {
        color: var(--chart-3);
        border-color: rgba(255, 184, 107, 0.35);
      }
      .chev {
        flex-shrink: 0;
        width: 1.2rem;
        height: 1.2rem;
        color: var(--muted);
        transition: transform 0.2s ease;
      }
      details.term-card[open] .chev {
        transform: rotate(180deg);
        color: var(--accent);
      }
      .term-body {
        padding: 0 1rem 1rem;
        border-top: 1px solid var(--border);
        animation: fadeIn 0.2s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .meaning {
        margin: 0;
        font-size: 0.95rem;
        color: var(--fg-soft);
        white-space: pre-wrap;
      }
      .term-meta {
        margin-top: 0.65rem;
        font-size: 0.72rem;
        color: var(--muted);
        font-family: var(--font-display);
      }
      .empty-hint {
        text-align: center;
        color: var(--muted);
        padding: 2rem 1rem;
        grid-column: 1 / -1;
      }
      .state {
        text-align: center;
        padding: 2.5rem 1rem;
        color: var(--muted);
        font-family: var(--font-body);
      }
      .state.err {
        color: var(--danger);
      }
      footer.site {
        margin-top: 2.5rem;
        padding-top: 1.1rem;
        border-top: 1px solid var(--border);
        font-size: 0.74rem;
        color: var(--muted);
        font-family: var(--font-display);
      }
      footer.site a {
        color: var(--accent);
        text-decoration: none;
      }
      footer.site a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="header-text">
          <h1 class="brand"><span>HR Tech</span> 용어 모음</h1>
          <p class="tagline">
            RSS로 모은 뉴스에서 추출한 테크 용어입니다. 카드를 누르면 풀이가
            펼쳐집니다.
          </p>
          <p class="tz-note">날짜·시각은 Asia/Seoul(한국 표준시) 기준입니다.</p>
        </div>
        <div class="meta-bar" id="meta-bar" hidden></div>
      </header>

      <div id="loading" class="state">데이터를 불러오는 중…</div>
      <div id="error" class="state err" hidden></div>

      <div id="app" hidden>
        <div class="toolbar">
          <label class="sr" for="q">검색</label>
          <input
            type="search"
            id="q"
            placeholder="용어·설명 검색…"
            autocomplete="off"
          />
          <span class="shown-count" id="shown-count"></span>
        </div>

        <div class="layout-split">
          <section
            class="cloud-panel"
            id="top-panel"
            hidden
            aria-labelledby="cloud-title"
          >
            <div class="cloud-panel__head">
              <div class="cloud-panel__titles">
                <h2 id="cloud-title">자주 잡힌 용어</h2>
                <span class="cloud-badge">등장 빈도</span>
              </div>
              <p class="cloud-hint">
                글자 크기는 등장 횟수에 비례합니다. 단어를 누르면 아래 목록으로
                스크롤됩니다.
              </p>
            </div>
            <div class="cloud-panel__stage">
              <div class="wordcloud-wrap" id="wordcloud-wrap">
                <canvas id="wordcloud-canvas" aria-label="용어 워드클라우드"></canvas>
              </div>
              <div class="cloud-fallback" id="cloud-fallback"></div>
            </div>
          </section>

          <aside class="side-aside">
            <details class="by-date" id="by-date-wrap" hidden>
              <summary>
                <span class="by-date__chev" aria-hidden="true">▸</span>
                <div class="by-date__summary-text">
                  <p class="by-date__title">날짜별 수집 기록</p>
                  <p class="by-date__meta" id="by-date-meta"></p>
                </div>
              </summary>
              <div class="by-date__body" id="by-date-body"></div>
            </details>
          </aside>
        </div>

        <h2 class="terms-head">전체 용어</h2>
        <section id="terms" aria-label="용어 목록"></section>
        <nav
          class="terms-pagination"
          id="terms-pagination"
          aria-label="용어 목록 페이지"
          hidden
        ></nav>
      </div>

      <footer class="site">
        <a href="https://github.com/KyoungwooNam/arrrr">소스 저장소</a>
        ·
        <a href="https://pages.github.com/">GitHub Pages</a>
        · 저장소: <code>docs/data/tech_terms.json</code>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.js"></script>
    <script>
      (function () {
        /**
         * GitHub Pages 프로젝트 사이트는 보통 …/저장소이름/ 가 루트입니다.
         * 주소가 …/저장소이름 (슬래시 없음)이면 브라우저가 상대경로를 한 단계 위로 잡아
         * data/tech_terms.json → 도메인 루트의 /data/… 로 가서 404가 납니다.
         * 현재 문서가 속한 "디렉터리"를 기준으로 JSON 절대 URL을 만듭니다.
         */
        function resolveTechTermsJsonUrl() {
          const path = location.pathname;
          let dir = path;
          if (!dir.endsWith("/")) {
            const last = path.split("/").pop() || "";
            if (/\.html?$/i.test(last)) {
              dir = path.replace(/\/[^/]+$/, "/");
            } else {
              dir = path + "/";
            }
          }
          return new URL("data/tech_terms.json", location.origin + dir).href;
        }
        const JSON_URL = resolveTechTermsJsonUrl();
        const TZ_SEOUL = "Asia/Seoul";
        let allTerms = [];
        let cloudResizeTimer = null;
        let lastCloudList = null;
        /** 현재 선택한 시작 글자 버킷: "a"~"z" 또는 그 외 "#" */
        let termsLetterKey = "a";
        let termsListRef = [];

        function el(tag, attrs, children) {
          const n = document.createElement(tag);
          if (attrs) {
            Object.entries(attrs).forEach(([k, v]) => {
              if (k === "text") n.textContent = v;
              else if (k === "html") n.innerHTML = v;
              else if (k.startsWith("on") && typeof v === "function")
                n.addEventListener(k.slice(2).toLowerCase(), v);
              else n.setAttribute(k, v);
            });
          }
          (children || []).forEach((c) => n.appendChild(c));
          return n;
        }

        function termKey(name) {
          return (name || "").trim().toLowerCase().replace(/\s+/g, " ");
        }

        function escapeCssAttr(val) {
          if (typeof CSS !== "undefined" && typeof CSS.escape === "function") {
            return CSS.escape(val);
          }
          return String(val).replace(/["\\]/g, "\\$&");
        }

        function formatSeoulDateTime(iso) {
          if (!iso || typeof iso !== "string") return "—";
          const d = new Date(iso);
          if (Number.isNaN(d.getTime())) return iso;
          try {
            return new Intl.DateTimeFormat("ko-KR", {
              timeZone: TZ_SEOUL,
              year: "numeric",
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            }).format(d);
          } catch (e) {
            return d.toLocaleString("ko-KR");
          }
        }

        function formatSeoulDateKey(dayKey) {
          if (!dayKey || typeof dayKey !== "string") return "—";
          const d = new Date(dayKey + "T00:00:00Z");
          if (Number.isNaN(d.getTime())) return dayKey;
          try {
            return new Intl.DateTimeFormat("ko-KR", {
              timeZone: TZ_SEOUL,
              weekday: "short",
              year: "numeric",
              month: "long",
              day: "numeric",
            }).format(d);
          } catch (e) {
            return dayKey;
          }
        }

        function renderMeta(meta) {
          const bar = document.getElementById("meta-bar");
          bar.innerHTML = "";
          const parts = [
            [
              "마지막 갱신",
              formatSeoulDateTime(meta.updated_at || meta.last_fetch_at),
            ],
            ["용어 수", String((allTerms && allTerms.length) || 0)],
            ["모델", meta.model || "—"],
          ];
          if (meta.corpus_chars != null) {
            parts.push(["코퍼스 글자 수", String(meta.corpus_chars)]);
          }
          parts.forEach(([k, v]) => {
            const pill = el("span", { class: "pill" });
            const b = document.createElement("b");
            b.textContent = k + ":";
            pill.appendChild(b);
            pill.appendChild(document.createTextNode(" " + v));
            bar.appendChild(pill);
          });
          bar.hidden = false;
        }

        function buildTopList(meta) {
          if (
            Array.isArray(meta.top_terms_by_appearance) &&
            meta.top_terms_by_appearance.length
          ) {
            return meta.top_terms_by_appearance
              .filter((r) => r && r.term)
              .slice(0, 80);
          }
          const fromTerms = [...allTerms]
            .map((t) => ({
              term: t.term,
              appearance_count: Number(t.appearance_count) || 1,
            }))
            .sort(
              (a, b) =>
                b.appearance_count - a.appearance_count ||
                (a.term || "").localeCompare(b.term || "")
            )
            .slice(0, 80);
          return fromTerms;
        }

        function hslWordColor() {
          const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const hues = [210, 175, 265, 145, 32, 330];
          const h = hues[Math.floor(Math.random() * hues.length)];
          const s = dark ? "62%" : "58%";
          const l = dark ? "68%" : "36%";
          return "hsl(" + h + "," + s + "," + l + ")";
        }

        /** 용어 문자열 기준 첫 글자 → a~z 버킷, 영문 A–Z가 아니면 "#" */
        function termFirstLetterBucket(term) {
          const s = String(term || "").trim();
          if (!s.length) return "#";
          const ch = s.charAt(0);
          if (/^[a-zA-Z]$/.test(ch)) return ch.toLowerCase();
          return "#";
        }

        function bucketTermsByFirstLetter(list) {
          const buckets = {};
          list.forEach(function (t) {
            const k = termFirstLetterBucket(t.term);
            if (!buckets[k]) buckets[k] = [];
            buckets[k].push(t);
          });
          Object.keys(buckets).forEach(function (k) {
            buckets[k].sort(function (a, b) {
              return String(a.term || "").localeCompare(
                String(b.term || ""),
                "en",
                { sensitivity: "base" }
              );
            });
          });
          return buckets;
        }

        function orderedLetterKeys(buckets) {
          const keys = Object.keys(buckets).filter(function (k) {
            return buckets[k].length > 0;
          });
          keys.sort(function (a, b) {
            if (a === "#") return 1;
            if (b === "#") return -1;
            return a.localeCompare(b);
          });
          return keys;
        }

        function renderTermsLetterNav(letterOrder) {
          const nav = document.getElementById("terms-pagination");
          if (!nav) return;
          if (letterOrder.length === 0) {
            nav.innerHTML = "";
            nav.hidden = true;
            return;
          }
          nav.hidden = false;
          nav.innerHTML = "";

          const ix = letterOrder.indexOf(termsLetterKey);
          const pos = ix >= 0 ? ix : 0;

          const prevBtn = el("button", {
            type: "button",
            class: "terms-page-btn terms-page-btn--nav",
            text: "이전 글자",
            onclick: function () {
              if (pos <= 0) return;
              termsLetterKey = letterOrder[pos - 1];
              renderTerms(termsListRef, { keepPage: true });
            },
          });
          prevBtn.disabled = pos <= 0;

          const nextBtn = el("button", {
            type: "button",
            class: "terms-page-btn terms-page-btn--nav",
            text: "다음 글자",
            onclick: function () {
              if (pos >= letterOrder.length - 1) return;
              termsLetterKey = letterOrder[pos + 1];
              renderTerms(termsListRef, { keepPage: true });
            },
          });
          nextBtn.disabled = pos >= letterOrder.length - 1;

          const pagesWrap = el("div", { class: "terms-pagination__pages" });
          letterOrder.forEach(function (letter) {
            const isCur = letter === termsLetterKey;
            const label = letter === "#" ? "#" : letter;
            const btn = el("button", {
              type: "button",
              class: "terms-page-btn" + (isCur ? " is-current" : ""),
              text: label,
              "aria-label":
                (letter === "#"
                  ? "영문 a–z로 시작하지 않는 용어"
                  : "「" + letter + "」로 시작하는 용어") + " 보기",
              onclick: function () {
                termsLetterKey = letter;
                renderTerms(termsListRef, { keepPage: true });
              },
            });
            if (isCur) btn.setAttribute("aria-current", "page");
            pagesWrap.appendChild(btn);
          });

          nav.appendChild(prevBtn);
          nav.appendChild(pagesWrap);
          nav.appendChild(nextBtn);
        }

        function scrollToTerm(word) {
          const key = termKey(word);
          const input = document.getElementById("q");
          let list = filterTerms(input.value);
          let found = list.find(function (t) {
            return termKey(t.term) === key;
          });
          if (!found) {
            input.value = "";
            list = filterTerms("");
            found = list.find(function (t) {
              return termKey(t.term) === key;
            });
          }
          if (!found) return;
          termsLetterKey = termFirstLetterBucket(found.term);
          renderTerms(list, { keepPage: true });
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              const card = document.querySelector(
                '[data-term-key="' + escapeCssAttr(key) + '"]'
              );
              if (!card) return;
              card.open = true;
              card.scrollIntoView({ behavior: "smooth", block: "nearest" });
            });
          });
        }

        function drawWordCloud(list) {
          lastCloudList = list;
          const wrap = document.getElementById("wordcloud-wrap");
          const canvas = document.getElementById("wordcloud-canvas");
          const fallback = document.getElementById("cloud-fallback");
          const panel = document.getElementById("top-panel");

          if (!list || !list.length) {
            panel.hidden = true;
            return;
          }

          const pairs = list.map((r) => [
            String(r.term),
            Math.max(1, Number(r.appearance_count) || 1),
          ]);
          const maxW = Math.max(...pairs.map((p) => p[1]), 1);

          if (typeof WordCloud !== "function") {
            fallback.innerHTML = "";
            pairs.slice(0, 24).forEach(([w, n]) => {
              const s = el("span", { text: w + " (" + n + ")" });
              s.style.fontSize = 0.65 + (n / maxW) * 0.5 + "rem";
              fallback.appendChild(s);
            });
            fallback.classList.add("is-visible");
            panel.hidden = false;
            return;
          }
          fallback.classList.remove("is-visible");

          /* 레이아웃 직후 0이 나오는 경우 대비 */
          let w = wrap.clientWidth;
          let h = wrap.clientHeight;
          if (h < 48) {
            h = wrap.offsetHeight || 220;
          }
          if (w < 48) {
            w = Math.max(wrap.offsetWidth, 240);
          }
          if (w < 40 || h < 40) return;

          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = Math.floor(w * dpr);
          canvas.height = Math.floor(h * dpr);
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
          /* WordCloud2는 canvas.width/height 버퍼 좌표로 그림 — ctx.scale과 함께 쓰면 격자/클리어가 어긋남 */

          const bg = getComputedStyle(document.documentElement)
            .getPropertyValue("--bg-elevated")
            .trim();

          WordCloud(canvas, {
            list: pairs,
            gridSize: Math.max(4, Math.round(8 * (w / 1024))),
            weightFactor: function (size) {
              return (
                Math.pow(size / maxW, 0.72) * Math.min(18, w / 55) + 10
              );
            },
            fontFamily: "Outfit, system-ui, sans-serif",
            color: function () {
              return hslWordColor();
            },
            rotateRatio: 0.15,
            rotationSteps: 2,
            backgroundColor: bg || "#12151c",
            minSize: 8,
            click: function (item) {
              if (item && item[0]) scrollToTerm(item[0]);
            },
          });

          panel.hidden = false;
        }

        function scheduleWordCloud(list) {
          if (!list || !list.length) {
            document.getElementById("top-panel").hidden = true;
            return;
          }
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              drawWordCloud(list);
            });
          });
        }

        window.addEventListener("resize", function () {
          if (!lastCloudList || typeof WordCloud !== "function") return;
          clearTimeout(cloudResizeTimer);
          cloudResizeTimer = setTimeout(function () {
            drawWordCloud(lastCloudList);
          }, 200);
        });

        function renderByDate(byDate) {
          if (!byDate || typeof byDate !== "object") return;
          const keys = Object.keys(byDate).sort().reverse();
          if (keys.length === 0) return;
          const wrap = document.getElementById("by-date-wrap");
          const body = document.getElementById("by-date-body");
          const metaEl = document.getElementById("by-date-meta");
          body.innerHTML = "";
          let totalRuns = 0;
          keys.forEach(function (day) {
            const entry = byDate[day];
            const runs = entry && entry.runs;
            if (Array.isArray(runs)) {
              totalRuns += runs.filter(Boolean).length;
            }
          });
          if (metaEl) {
            metaEl.textContent =
              keys.length +
              "일 · 수집 " +
              totalRuns +
              "회 — 펼쳐서 실행별 용어를 확인하세요.";
          }
          keys.forEach((day) => {
            const entry = byDate[day];
            const runs = entry && entry.runs;
            const runList = Array.isArray(runs) ? runs.filter(Boolean) : [];
            const block = el("div", { class: "day-block" });
            const header = el("div", { class: "day-block__header" });
            header.appendChild(el("h3", { text: formatSeoulDateKey(day) }));
            header.appendChild(
              el("span", {
                class: "day-block__badge",
                text: runList.length + "회 실행",
              })
            );
            block.appendChild(header);
            runList.forEach((r) => {
              const card = el("div", { class: "run-card" });
              card.appendChild(
                el("p", {
                  class: "run-card__time",
                  text: formatSeoulDateTime(r.run_at),
                })
              );
              const tags = el("div", { class: "term-tags" });
              (r.extracted_terms || []).forEach((t) => {
                tags.appendChild(el("span", { text: String(t) }));
              });
              if (tags.childNodes.length) card.appendChild(tags);
              block.appendChild(card);
            });
            body.appendChild(block);
          });
          wrap.hidden = false;
        }

        function chevronSvg() {
          const svg = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "svg"
          );
          svg.setAttribute("class", "chev");
          svg.setAttribute("viewBox", "0 0 24 24");
          svg.setAttribute("aria-hidden", "true");
          const p = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path"
          );
          p.setAttribute("fill", "currentColor");
          p.setAttribute("d", "M7 10l5 5 5-5H7z");
          svg.appendChild(p);
          return svg;
        }

        function renderTerms(list, options) {
          const keepPage = options && options.keepPage;
          termsListRef = list;
          const root = document.getElementById("terms");
          root.innerHTML = "";
          const total = list.length;
          const buckets = bucketTermsByFirstLetter(list);
          const letterOrder = orderedLetterKeys(buckets);

          if (total === 0) {
            document.getElementById("shown-count").textContent = "0개 표시";
            root.appendChild(
              el("p", {
                class: "empty-hint",
                text: "조건에 맞는 용어가 없습니다.",
              })
            );
            renderTermsLetterNav([]);
            return;
          }

          if (!keepPage || letterOrder.indexOf(termsLetterKey) < 0) {
            termsLetterKey = letterOrder[0];
          }

          const pageSlice = buckets[termsLetterKey] || [];
          const letterLabel =
            termsLetterKey === "#"
              ? "a–z 외"
              : "「" + termsLetterKey + "」로 시작";
          document.getElementById("shown-count").textContent =
            total +
            "개 중 " +
            pageSlice.length +
            "개 표시 · " +
            letterLabel;

          pageSlice.forEach((t) => {
            const details = el("details", { class: "term-card" });
            details.setAttribute("data-term-key", termKey(t.term));

            const summary = el("summary");
            const left = el("div", { class: "term-summary-left" });
            left.appendChild(
              el("span", { class: "term-name", text: t.term || "" })
            );
            const badges = el("div", { class: "term-badges" });
            const ac = Number(t.appearance_count) || 1;
            if (ac > 1) {
              badges.appendChild(
                el("span", { class: "badge hot", text: ac + "회" })
              );
            }
            if (badges.childNodes.length) left.appendChild(badges);
            summary.appendChild(left);
            summary.appendChild(chevronSvg());
            details.appendChild(summary);

            const body = el("div", { class: "term-body" });
            body.appendChild(
              el("p", { class: "meaning", text: t.meaning || "" })
            );
            const metaBits = [];
            if (ac > 1) metaBits.push("누적 등장 " + ac + "회");
            if (Array.isArray(t.dates_seen) && t.dates_seen.length) {
              const seoulDates = t.dates_seen.map((d) =>
                d && d.length >= 10 ? formatSeoulDateKey(d.slice(0, 10)) : d
              );
              metaBits.push("관측일: " + seoulDates.join(", "));
            }
            if (t.updated_at) {
              metaBits.push(
                "설명 갱신: " + formatSeoulDateTime(t.updated_at)
              );
            }
            if (metaBits.length) {
              body.appendChild(
                el("p", { class: "term-meta", text: metaBits.join(" · ") })
              );
            }
            details.appendChild(body);
            root.appendChild(details);
          });

          if (pageSlice.length === 0 && letterOrder.length) {
            termsLetterKey = letterOrder[0];
            renderTerms(list, { keepPage: true });
            return;
          }

          renderTermsLetterNav(letterOrder);
        }

        function filterTerms(q) {
          const s = (q || "").trim().toLowerCase();
          if (!s) return allTerms.slice();
          return allTerms.filter((t) => {
            const term = (t.term || "").toLowerCase();
            const mean = (t.meaning || "").toLowerCase();
            return term.includes(s) || mean.includes(s);
          });
        }

        document.getElementById("q").addEventListener("input", (e) => {
          renderTerms(filterTerms(e.target.value));
        });

        fetch(JSON_URL, { cache: "no-cache" })
          .then((r) => {
            if (!r.ok) throw new Error("HTTP " + r.status + " — " + JSON_URL);
            return r.json();
          })
          .then((data) => {
            document.getElementById("loading").hidden = true;
            allTerms = Array.isArray(data.terms) ? data.terms : [];
            const meta = data.meta || {};
            renderMeta(meta);
            renderByDate(data.by_date);
            renderTerms(allTerms);
            document.getElementById("app").hidden = false;

            const topList = buildTopList(meta);
            if (topList.length >= 1) {
              scheduleWordCloud(topList);
            }
          })
          .catch((err) => {
            document.getElementById("loading").hidden = true;
            const er = document.getElementById("error");
            er.hidden = false;
            er.textContent =
              "JSON을 불러오지 못했습니다. " +
              (err && err.message ? err.message : String(err)) +
              " 저장소에는 docs/data/tech_terms.json 이고, 배포 루트에서는 data/tech_terms.json 입니다.";
          });
      })();
    </script>
  </body>
</html>
