# 저장소: https://github.com/KyoungwooNam/arrrr
# GitHub Pages: docs/ 폴더를 정적 사이트 루트로 배포합니다.
# 저장소 Settings → Pages → Build and deployment → Source: GitHub Actions 선택 후
# 첫 푸시 시 제안되는 "Configure"로 이 워크플로를 연결할 수 있습니다.
name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 수집 스크립트가 docs/data/tech_terms.json 에만 씁니다. 없으면 빈 JSON으로 자리만 둡니다.
      - name: Ensure docs/data/tech_terms.json exists
        run: |
          mkdir -p docs/data
          if [ ! -f docs/data/tech_terms.json ]; then
            echo '{"meta":{"updated_at":null},"terms":[],"by_date":{}}' > docs/data/tech_terms.json
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
