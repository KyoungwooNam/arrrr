# 저장소: https://github.com/KyoungwooNam/arrrr
# Secrets에 OPENAI_API_KEY 등록 필요.
# 용어 JSON은 docs/data/tech_terms.json 한 경로만 사용합니다.
# 봇이 그 파일만 바꿔 푸시할 때는 paths-ignore로 수집 워크플로는 다시 돌지 않습니다.
name: Collect tech terms

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/data/tech_terms.json"
  schedule:
    # 매주 월요일 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: collect-tech-terms
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect terms
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: python scripts/collect_tech_terms.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/tech_terms.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: update docs/data/tech_terms.json"
            git push
          fi
