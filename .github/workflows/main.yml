name: Update Job Trend Data

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data.json' # data.json이 업데이트될 때는 워크플로우를 실행하지 않음 (무한루프 방지)
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 openai

      - name: Run script
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python job_trend_llm_pipeline.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 변경사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update job trend data: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
